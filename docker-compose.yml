services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sr_laravel_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./app:/var/www
    networks:
      - laravel

  nginx:
    image: nginx:alpine
    container_name: sr_laravel_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./app:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    networks:
      - laravel

  mysql:
    image: mysql:8
    container_name: sr_laravel_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel


  phpmyadmin:
      image: phpmyadmin:latest
      container_name: sr_laravel_pma
      restart: unless-stopped
      ports:
        - "8080:80"
      environment:
        - PMA_ARBITRARY=1
        - PMA_HOST=mysql
        - MYSQL_ROOT_PASSWORD=root
      networks:
        - laravel      

networks:
  laravel:

volumes:
  mysql_data:
